# Auto-PRs from Dependabot when our deps publish updates. Cheap insurance
# against falling behind on security patches in xUnit / Microsoft.NET.Test.Sdk
# / the test runner.

version: 2
updates:
  # NuGet packages (test project — production plugin has no NuGet deps).
  - package-ecosystem: "nuget"
    directory: "/tests/EQ2Lexicon.ACTPlugin.Tests"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["deps", "nuget"]
    commit-message:
      prefix: "deps"
      include: "scope"
    ignore:
      # coverlet.collector v8+ raised the runtime minimum to .NET 8,
      # which means the collector DLL no longer loads into our net48
      # test host (VSTest can't register the collector → "Unable to
      # find a datacollector with friendly name 'XPlat Code Coverage'").
      # Staying on the 6.x line until we either multi-target the tests
      # project to net8.0 or migrate to coverlet.msbuild. See PR #5
      # for the failure mode.
      - dependency-name: "coverlet.collector"
        update-types: ["version-update:semver-major"]

  # GitHub Actions versions (when we add CI workflows).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels: ["deps", "ci"]
    commit-message:
      prefix: "ci"
      include: "scope"
