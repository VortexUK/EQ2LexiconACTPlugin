name: CI

# Runs on every push and PR to main. We use windows-latest because the
# tests target net48 (the plugin runs inside ACT, which is net48-only),
# and only the Windows runner ships the .NET Framework reference
# assemblies the test host needs. Ubuntu would require a mono install
# and isn't worth the complication. windows-latest is free for public
# repos and bills 2x Linux minutes for private — acceptable for a small
# plugin codebase.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      # ACT is strong-named, so a stub assembly can't produce a UI
      # DLL that loads at runtime. Fetch the real ACTv3.zip from
      # upstream (~1.3MB) so the UI assembly build catches breakage
      # on every PR, not just at release time.
      - name: Fetch ACT for build reference
        shell: pwsh
        run: |
          $url = "https://github.com/EQAditu/AdvancedCombatTracker/releases/latest/download/ACTv3.zip"
          Invoke-WebRequest -Uri $url -OutFile ACTv3.zip -UseBasicParsing
          Expand-Archive -Path ACTv3.zip -DestinationPath C:\ACT -Force
          if (-not (Test-Path "C:\ACT\Advanced Combat Tracker.exe")) {
            throw "ACT exe not found in extracted zip"
          }
          "ACT_INSTALL_DIR=C:\ACT" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      # global.json pins the SDK version; setup-dotnet will read it.
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore EQ2Lexicon.ACTPlugin.sln

      # Same gate the pre-push hook runs locally. Anything that landed
      # without --verify-no-changes locally fails here.
      - name: Format check
        run: dotnet format --verify-no-changes EQ2Lexicon.ACTPlugin.sln

      # Build everything: Core, UI (now possible thanks to the ACT
      # fetch above), and tests. Building the whole sln in one go
      # also exercises the UI -> Core ProjectReference wiring.
      - name: Build solution
        run: dotnet build EQ2Lexicon.ACTPlugin.sln -c Release --no-restore

      - name: Test with coverage
        run: >
          dotnet test tests/EQ2Lexicon.ACTPlugin.Tests/EQ2Lexicon.ACTPlugin.Tests.csproj
          -c Release --no-build
          --collect:"XPlat Code Coverage"
          --results-directory TestResults
          --logger "trx;LogFileName=test-results.trx"

      # `dotnet list package --vulnerable` always exits 0; the only
      # signal is the "has the following vulnerable packages" line in
      # its output. Mirrors what .githooks/pre-push checks locally.
      - name: Vulnerability scan
        shell: pwsh
        run: |
          $output = dotnet list EQ2Lexicon.ACTPlugin.sln package --vulnerable --include-transitive 2>&1 | Out-String
          Write-Host $output
          if ($output -match "has the following vulnerable packages") {
            Write-Error "Vulnerable packages found"
            exit 1
          }

      - name: Install ReportGenerator
        run: dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Generate coverage report
        shell: pwsh
        run: |
          reportgenerator `
            -reports:"TestResults/**/coverage.cobertura.xml" `
            -targetdir:"TestResults/CoverageReport" `
            -reporttypes:"Html;TextSummary;MarkdownSummaryGithub"

      # Surface coverage in the job summary so reviewers see it without
      # having to download the artifact.
      - name: Post coverage summary
        shell: pwsh
        run: |
          $md = "TestResults/CoverageReport/SummaryGithub.md"
          if (Test-Path $md) {
            Get-Content $md | Add-Content -Path $env:GITHUB_STEP_SUMMARY
          }
          Get-Content "TestResults/CoverageReport/Summary.txt"

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: TestResults/CoverageReport
          retention-days: 30

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results
          path: TestResults/*.trx
          retention-days: 30
